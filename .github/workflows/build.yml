name: Build APK

# Tu dong chay khi push code len nhanh main, hoac bam nut "Run workflow"
# thu cong trong tab Actions cua GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    # Gioi han toi da 90 phut - neu vuot qua nghia la co cho bi treo
    # thuc su (vd mang cham), GitHub se huy va bao loi ro rang thay vi
    # cho ngam (mac dinh GitHub la 360 phut, qua dai de phat hien treo).
    timeout-minutes: 90
    env:
      # Tat buffer cua Python de log hien thi NGAY LAP TUC (realtime),
      # tranh truong hop tien trinh bi treo/giet ma khong kip in dong
      # loi cuoi cung ra man hinh (day la nghi van chinh cua lan loi truoc).
      PYTHONUNBUFFERED: "1"
    steps:
      - name: Lay code tu repository
        uses: actions/checkout@v4

      - name: Cai Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cai JDK 17 (Temurin)
        id: setup_java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cai cac thu vien he thong can cho Buildozer (Android build)
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev automake build-essential \
            ccache

      - name: Cai Buildozer va Cython
        run: |
          pip install --upgrade pip
          pip install buildozer==1.5.0 cython==0.29.36

      - name: Don dep dung luong dia trong (runner GitHub co san nhieu thu nang khong can)
        run: |
          echo "--- Dung luong dia TRUOC khi don ---"
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /usr/local/.ghcup /usr/local/share/boost \
                      "$AGENT_TOOLSDIRECTORY" 2>/dev/null || true
          sudo docker image prune -a -f 2>/dev/null || true
          echo "--- Dung luong dia SAU khi don ---"
          df -h /

      - name: Cache thu muc build cua Buildozer (lan sau build nhanh hon)
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          # Doi key sang v2 de bo qua cache cu (nghi van cache bi luu
          # dang khi build lan truoc bi chet giua luc giai nen SDK).
          key: buildozer-v2-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-v2-${{ runner.os }}-

      - name: In thong tin moi truong (de doi chieu khi debug)
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          python3 --version
          df -h .
          free -h

      - name: Build APK (debug, log day du khong bi cat)
        run: |
          set -o pipefail

          # Chay tien trinh giam sat dung luong dia + RAM moi 20 giay
          # trong nen, ghi vao file rieng - de biet CHINH XAC luc nao
          # bi het tai nguyen (neu co), thay vi doan mo.
          ( while true; do
              echo "[$(date '+%H:%M:%S')] $(df -h / | tail -1) | $(free -h | grep Mem)"
              sleep 20
            done ) > resource_monitor.log &
          MONITOR_PID=$!

          yes | buildozer -v android debug 2>&1 | tee buildozer_full_log.txt
          BUILD_EXIT=${PIPESTATUS[0]}

          kill $MONITOR_PID 2>/dev/null || true
          exit $BUILD_EXIT
        shell: bash

      - name: Luu log giam sat tai nguyen (RAM/dia theo thoi gian)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: resource-monitor-log
          path: resource_monitor.log
          if-no-files-found: warn

      - name: Luu log day du (de xem ngay ca khi build that bai)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-full-log
          path: buildozer_full_log.txt
          if-no-files-found: warn

      - name: Tai file APK len (xem trong tab Artifacts sau khi chay xong)
        uses: actions/upload-artifact@v4
        with:
          name: viethoa-tool-apk
          path: bin/*.apk
          if-no-files-found: error
